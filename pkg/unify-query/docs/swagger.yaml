      message:
        type: string
      path:
        items:
          type: string
        type: array
      source_info:
        $ref: '#/definitions/cmdb.Matcher'
      source_type:
        type: string
      target_list:
        items:
          $ref: '#/definitions/cmdb.MatchersWithTimestamp'
        type: array
      target_type:
        type: string
    type: object
  cmdb.RelationMultiResourceRequest:
    properties:
