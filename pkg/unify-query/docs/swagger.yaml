    type: object
  metadata.Status:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  metadata.TimeField:
    properties:
      name:
        type: string
      type:
        type: string
      unit:
        type: string
    type: object
  query.Filter:
    additionalProperties:
      type: string
    type: object
  query.Record:
    properties:
      enable_time:
        type: integer
      storage_id:
        type: string
    type: object
  query.TsDBV2:
    properties:
      cluster_name:
        type: string
      cmdb_level_vm_rt:
        type: string
      data_label:
        type: string
      db:
        type: string
      expand_metric_names:
        items:
          type: string
        type: array
      field:
        items:
          type: string
        type: array
      field_alias:
        $ref: '#/definitions/metadata.FieldAlias'
      filters:
        items:
          $ref: '#/definitions/query.Filter'
        type: array
      measurement:
        type: string
      measurement_type:
        type: string
      metric_name:
        description: 补充检索的元信息
        type: string
      need_add_time:
        description: NeedAddTime
        type: boolean
      segmented_enable:
        type: boolean
      source_type:
        description: SourceType 数据来源
        type: string
      storage_cluster_records:
        description: StorageClusterRecords
        items:
          $ref: '#/definitions/query.Record'
        type: array
      storage_id:
        description: 将存储信息合并在 TsDB 中
        type: string
      storage_name:
        type: string
      storage_type:
        type: string
      table_id:
        type: string
      tags_key:
        items:
          type: string
        type: array
      time_field:
        allOf:
        - $ref: '#/definitions/metadata.TimeField'
        description: timeField
      vm_rt:
        type: string
    type: object
  structured.AggregateMethod:
    properties:
      dimensions:
        description: Dimensions 聚合维度
        example:
        - bk_target_ip
        - bk_target_cloud_id
        items:
          type: string
        type: array
      field:
        description: Field 聚合字段，默认为指标字段，指定则会进行覆盖
        example: field
        type: string
      is_sub_query:
        description: IsSubQuery 判断是否为子查询
        type: boolean
      method:
        description: Method 聚合方法
        example: mean
        type: string
      window:
        description: Window 聚合周期
        example: 60s
        type: string
      without:
        description: Without
        type: boolean
    type: object
  structured.ConditionField:
    properties:
      field_name:
        description: DimensionName 过滤字段
        example: bk_biz_id
        type: string
      is_prefix:
        description: IsPrefix 是否是前缀
        type: boolean
      is_suffix:
        description: IsSuffix 是否是后缀
        type: boolean
      is_wildcard:
        description: IsWildcard 是否是通配符
        type: boolean
      op:
        description: Operator 操作符，包含：eq,ne,erq,nreq,contains,ncontains
        example: contains
        type: string
      value:
        description: Value 查询值
        example:
        - "2"
        items:
          type: string
        type: array
    type: object
  structured.Conditions:
    properties:
      condition_list:
        description: ConditionList 组合条件，长度 = len(FieldList) - 1的数组，支持 and,or
        example:
        - and
        items:
          type: string
        type: array
      field_list:
        description: FieldList 查询条件
        items:
          $ref: '#/definitions/structured.ConditionField'
        type: array
    type: object
  structured.Query:
    properties:
      collapse:
        allOf:
        - $ref: '#/definitions/metadata.Collapse'
        description: Collapse
      conditions:
        allOf:
        - $ref: '#/definitions/structured.Conditions'
        description: Conditions 过滤条件
      dimensions:
        description: Dimensions promQL 使用维度
        example:
        - bk_target_ip
        - bk_target_cloud_id
        items:
          type: string
        type: array
      field_name:
        description: FieldName 查询指标
        example: usage
        type: string
      from:
        description: From 翻页开启数字
        example: 0
        type: integer
      function:
        description: AggregateMethodList 维度聚合函数
        items:
          $ref: '#/definitions/structured.AggregateMethod'
        type: array
      is_dom_sampled:
        description: IsDomSampled 是否命中降采样算法
        type: boolean
      is_prefix:
        description: IsPrefix 是否启用前缀匹配
        type: boolean
      is_regexp:
        description: IsRegexp 指标是否使用正则查询
        example: false
        type: boolean
      limit:
        description: Limit 点数限制数量
        example: 0
        type: integer
      offset:
        description: Offset 偏移量
        example: ""
        type: string
      offset_forward:
        description: OffsetForward 偏移方向，默认 false 为向前偏移
        example: false
        type: boolean
      query_string:
        description: QueryString 关键字查询
        type: string
      reference_name:
        description: ReferenceName 别名，用于表达式计算
        example: a
        type: string
      slimit:
        description: Slimit 维度限制数量
        example: 0
        type: integer
      sql:
        description: SQL doris sql 解析
        type: string
      start_or_end:
        description: StartOrEnd @-modifier 标记，start or end
        type: integer
      table_id:
        description: TableID 数据实体ID，容器指标可以为空
        example: system.cpu_summary
        type: string
      table_id_conditions:
        description: TableIDConditions 表标签条件（Body table_id_conditions 与 PromQL __bk_query_label_selector_<维度>
          写入此字段，用于路由选表）；AllConditions 形态，内层 AND、外层 OR。
        items:
          items:
            $ref: '#/definitions/structured.ConditionField'
          type: array
        type: array
      time_aggregation:
        allOf:
        - $ref: '#/definitions/structured.TimeAggregation'
        description: TimeAggregation 时间聚合方法
      timestamp:
        description: Timestamp @-modifier 标记
        type: integer
      vector_offset:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: VectorOffset
    type: object
  structured.QueryPromQL:
    properties:
      add_dimensions:
        description: AddDimensions 额外添加的聚合维度，会与每个 function.dimensions 合并
        items:
          type: string
        type: array
      bk_biz_ids:
        items:
          type: string
        type: array
      down_sample_range:
        description: DownSampleRange 降采样：大于Step才能生效，可以为空
        example: 5m
        type: string
      end:
        type: string
      instant:
        description: 瞬时数据
        type: boolean
      is_verify_dimensions:
        type: boolean
      limit:
        type: integer
      look_back_delta:
        description: LookBackDelta 偏移量
        type: string
      match:
        type: string
      max_source_resolution:
        type: string
      not_align_influxdb:
        description: 不与influxdb对齐
        type: boolean
      not_time_align:
        type: boolean
      promql:
        type: string
      reference:
        type: boolean
      slimit:
        type: integer
      start:
        type: string
      step:
        type: string
      timezone:
        description: Timezone 时区
        example: Asia/Shanghai
        type: string
    type: object
  structured.QueryTs:
    properties:
      add_dimensions:
        description: AddDimensions 额外添加的聚合维度，会与每个 function.dimensions 合并
        items:
          type: string
        type: array
      clear_cache:
        description: ClearCache 是否强制清理已存在的缓存会话
        type: boolean
      down_sample_range:
        description: DownSampleRange 降采样：大于Step才能生效，可以为空
        example: 5m
        type: string
      dry_run:
        description: DryRun 是否启用 DryRun
        type: boolean
      end_time:
        description: End 结束时间：单位为任意长度的时间戳
        example: "1657851600"
        type: string
      from:
        description: From 翻页开启数字
        example: 0
        type: integer
      highlight:
        allOf:
        - $ref: '#/definitions/metadata.HighLight'
        description: HighLight 是否开启高亮
      instant:
        description: Instant 瞬时数据
        type: boolean
      is_merge_db:
        description: IsMergeDB 是否启用合并 db 特性
        type: boolean
      is_multi_from:
        description: IsMultiFrom 是否启用 MultiFrom 查询
        type: boolean
      is_search_after:
        description: IsSearchAfter 是否启用 SearchAfter 查询
        type: boolean
      limit:
        description: |-
          增加公共限制
          Limit 点数限制数量
        example: 0
        type: integer
      look_back_delta:
        description: LookBackDelta 偏移量
        type: string
      metric_merge:
        description: MetricMerge 表达式：支持所有PromQL语法
        example: a
        type: string
      not_time_align:
        description: |-
          NotTimeAlign 查询开始时间和聚合是否需要对齐
          例如
          true:  range: 10:03 - 10:23 window: 10m -> 10:03 - 10:13, 10:13 - 10:23
          false: range: 10:03 - 10:23 window: 10m -> 10:00 - 10:10, 10:10 - 10:20, 10:20 - 10:23
        type: boolean
      order_by:
        description: OrderBy 排序字段列表，按顺序排序，负数代表倒序, ["_time", "-_time"]
        items:
          type: string
        type: array
      query_list:
        description: QueryList 查询实例
        items:
          $ref: '#/definitions/structured.Query'
        type: array
      reference:
        description: |-
          Reference 查询开始时间是否需要对齐，
          例如：
          true:  range: 10:03 - 10:23 window: 10m -> 10:03 - 10:10, 10:10 - 10:20, 10:20 - 10:23
          false: range: 10:03 - 10:23 window: 10m -> 10:00 - 10:10, 10:10 - 10:20, 10:20 - 10:23
        type: boolean
      result_table_options:
        $ref: '#/definitions/metadata.ResultTableOptions'
      scroll:
        description: Scroll 是否启用 Scroll 查询
        type: string
      slice_max:
        description: SliceMax 最大切片数量
        type: integer
      space_uid:
        description: SpaceUid 空间ID
        type: string
      start_time:
        description: Start 开始时间：单位为任意长度的时间戳
        example: "1657848000"
        type: string
      step:
        description: Step 步长：最终返回的点数的时间间隔
        example: 1m
        type: string
      timezone:
        description: Timezone 时区
        example: Asia/Shanghai
        type: string
      tsdb_map:
        additionalProperties:
          items:
            $ref: '#/definitions/query.TsDBV2'
          type: array
        description: TsDBMap 查询路由匹配中的 tsDB 列表 key:reference_name
        type: object
    type: object
  structured.TimeAggregation:
    properties:
      function:
        description: Function 时间聚合方法
        example: avg_over_time
        type: string
      is_sub_query:
        description: IsSubQuery 判断是否为子查询
        type: boolean
      node_index:
        description: NodeIndex 聚合函数的位置，用于还原 promql 的定位
        type: integer
      window:
        description: Window 聚合周期
        example: 60s
        type: string
    type: object
  time.Duration:
