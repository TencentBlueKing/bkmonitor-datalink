            source_type:
              type: string
            target_info_show:
              type: boolean
            target_type:
              type: string
            timestamp:
              type: integer
          type: object
        type: array
    type: object
  cmdb.RelationMultiResourceResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/cmdb.RelationMultiResourceResponseData'
        type: array
      trace_id:
        type: string
    type: object
  cmdb.RelationMultiResourceResponseData:
    properties:
      code:
        type: integer
      message:
        type: string
      path:
        items:
          type: string
        type: array
      source_info:
        $ref: '#/definitions/cmdb.Matcher'
      source_type:
        type: string
      target_list:
        items:
          $ref: '#/definitions/cmdb.Matcher'
        type: array
      target_type:
        type: string
    type: object
  http.CheckQueryTsDataResponse:
    properties:
      data:
        description: Data 每项为子查询对应 tsdb.Instance.GetRequestBody(ctx) 的序列化结果。直查 VM
          常为单元素 VmQueryCheckBody：metricql 由 vmCheckMetricql 生成后经 metadata.SetCheckPreviewMetricQL
          写入，VM 实例在 GetRequestBody 中与 GetExpand 一并读出。非直查若某存储无预览体则跳过该项；若最终无任何元素则 400。不下发真实
          TSDB。
        items: {}
        type: array
      trace_id:
        description: TraceID 链路 ID（与 trace span 一致）。
        type: string
    type: object
  http.ErrResponse:
    properties:
      error:
        type: string
      trace_id:
        type: string
    type: object
  http.Params:
    properties:
      conditions:
        $ref: '#/definitions/structured.Conditions'
      data_source:
        type: string
      end_time:
        type: string
      is_regexp:
        description: IsRegexp 指标是否使用正则查询
        example: false
        type: boolean
      keys:
        items:
          type: string
        type: array
      limit:
        type: integer
      metric_name:
        type: string
      slimit:
        type: integer
      start_time:
        type: string
      table_id:
        type: string
      timezone:
        example: Asia/Shanghai
        type: string
      tsdb_map:
        additionalProperties:
          items:
            $ref: '#/definitions/query.TsDBV2'
          type: array
        type: object
    type: object
  http.PromData:
    properties:
