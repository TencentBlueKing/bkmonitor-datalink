github:
  # 上游项目仓库的组织
  repo_org: "TencentBlueKing"

  # 上游项目仓库的名称
  repo_name: "bkmonitor-datalink"

  # 指定里程碑ID，
  milestone_id: ""

project:
  # 默认单据来源
  # 未连内网/VPN 导致 gtm commit 无法访问 TAPD 时，可用 scripts/gtm-commit-offline.sh
  default_source: "tapd"
  # 默认目标分支
  default_target_branch: "master"
  # 范围，根据项目的模块或者分工设定，可为空
  scopes:
    - unify-query
    - bk-monitor-worker
    - bkmontiorbeat
    - collector
    - operator
    - transfer
    - apiserver
    - metadata
    - sliwebhook
    - influxdbproxy
    - influxdb
    - libgse

  default_label: "datalink"

  reviewers: [ ]
