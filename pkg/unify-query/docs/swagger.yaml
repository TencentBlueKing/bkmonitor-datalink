info:
  contact: {}
  description: bk unify-query swagger api
  title: bk-unify-query
  version: "1.0"
paths:
  /api/v1/relation/multi_resource:
    post:
      operationId: relation_multi_resource_query
      parameters:
      - default: 00-3967ac0f1648bf0216b27631730d7eb9-8e3c31d5109e78dd-01
        description: TraceID
        in: header
        name: traceparent
        type: string
      - default: bkcc__2
        description: 空间UID
        in: header
        name: X-Bk-Scope-Space-Uid
        type: string
      - description: json data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/cmdb.RelationMultiResourceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cmdb.RelationMultiResourceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrResponse'
      summary: query relation multi resource
  /api/v1/relation/multi_resource_range:
    post:
      operationId: relation_multi_resource_query_range
      parameters:
      - default: 00-3967ac0f1648bf0216b27631730d7eb9-8e3c31d5109e78dd-01
        description: TraceID
        in: header
        name: traceparent
        type: string
      - default: bkcc__2
        description: 空间UID
        in: header
        name: X-Bk-Scope-Space-Uid
        type: string
      - description: json data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/cmdb.RelationMultiResourceRangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cmdb.RelationMultiResourceRangeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrResponse'
      summary: query relation multi resource
  /check/query/ts:
    post:
      operationId: check_query_ts
      parameters:
      - default: 00-3967ac0f1648bf0216b27631730d7eb9-8e3c31d5109e78dd-01
        description: TraceID
        in: header
        name: traceparent
        type: string
      - default: bkcc__2
        description: 空间UID
        in: header
        name: X-Bk-Scope-Space-Uid
        type: string
      - default: ""
        description: 是否跳过空间验证
        in: header
        name: X-Bk-Scope-Skip-Space
        type: string
      - description: json data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/structured.QueryTs'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.CheckQueryTsDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrResponse'
      summary: query ts monitor check by ts
  /check/query/ts/promql:
    post:
      operationId: check_query_promql
      parameters:
      - default: 00-3967ac0f1648bf0216b27631730d7eb9-8e3c31d5109e78dd-01
        description: TraceID
        in: header
        name: traceparent
        type: string
      - default: bkcc__2
        description: 空间UID
        in: header
        name: X-Bk-Scope-Space-Uid
        type: string
      - default: ""
        description: 是否跳过空间验证
        in: header
        name: X-Bk-Scope-Skip-Space
        type: string
      - description: json data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/structured.QueryPromQL'
      produces:
