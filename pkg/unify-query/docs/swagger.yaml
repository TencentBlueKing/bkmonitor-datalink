          $ref: '#/definitions/http.TablesItem'
        type: array
      status:
        $ref: '#/definitions/metadata.Status'
      trace_id:
        type: string
    type: object
  http.SeriesData:
    properties:
      keys:
        items:
          type: string
        type: array
      measurement:
        type: string
      series:
        items:
          items:
            type: string
          type: array
        type: array
      trace_id:
        type: string
    type: object
  http.StatItem:
    properties:
      avg:
        $ref: '#/definitions/http.StatPoint'
      count:
        $ref: '#/definitions/http.StatPoint'
      last:
        $ref: '#/definitions/http.StatPoint'
      max:
        $ref: '#/definitions/http.StatPoint'
      min:
        $ref: '#/definitions/http.StatPoint'
      sum:
        $ref: '#/definitions/http.StatPoint'
    type: object
  http.StatPoint:
    type: object
  http.TablesItem:
    properties:
      columns:
        items:
          type: string
        type: array
      group_keys:
        items:
          type: string
        type: array
      group_values:
        items:
          type: string
        type: array
      metric_name:
        type: string
      name:
        type: string
      stat:
        $ref: '#/definitions/http.StatItem'
      types:
        items:
          type: string
        type: array
      values:
        items:
          items: {}
          type: array
        type: array
    type: object
  http.TagValuesData:
    properties:
      trace_id:
        type: string
      values:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
    type: object
  metadata.Collapse:
    properties:
      field:
        type: string
    type: object
  metadata.FieldAlias:
    additionalProperties:
      type: string
    type: object
  metadata.HighLight:
    properties:
      enable:
